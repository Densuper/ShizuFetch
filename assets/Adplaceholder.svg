<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- الخلفية الأساسية -->
  <rect width="1200" height="900" fill="#121212" />

  <!-- تأثير اللمعان (Shimmer) -->
  <defs>
    <linearGradient id="shimmer" x1="-100%" y1="0" x2="0%" y2="0">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="50%" stop-color="#2C2C2C" />
      <stop offset="100%" stop-color="#1E1E1E" />
      <animate attributeName="x1" values="-100%; 100%" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%; 200%" dur="1.5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <!-- تطبيق تأثير اللمعان -->
  <rect width="1200" height="900" fill="url(#shimmer)" />

  <!-- أيقونة الإضافة (ثابتة في المنتصف) -->
  <g transform="translate(550, 320) scale(4)" fill="#00d1b2">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
  </g>

  <!-- ======================== -->
  <!-- المجموعة الأولى: العربية -->
  <!-- ======================== -->
  <g>
    <!-- 
      دورة مدتها 10 ثوانٍ:
      - من 0s إلى 0.5s: تلاشي للظهور
      - من 0.5s إلى 4.5s: بقاء
      - من 4.5s إلى 5s: تلاشي للاختفاء
    -->
    <animate attributeName="opacity" 
             values="0; 1; 1; 0; 0" 
             keyTimes="0; 0.05; 0.45; 0.5; 1" 
             dur="10s" 
             repeatCount="indefinite" 
             calcMode="linear" />

    <text x="600" y="550" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">مساحة إعلانية متاحة</text>
    <text x="600" y="650" font-family="sans-serif" font-size="32" fill="#a0a0a0" text-anchor="middle">تواصل مع إدارة "صوان" لحجز هذه المساحة</text>
  </g>

  <!-- =========================== -->
  <!-- المجموعة الثانية: الإنجليزية -->
  <!-- =========================== -->
  <g>
    <!-- 
      دورة مدتها 10 ثوانٍ (مزاحة بمقدار 5 ثوانٍ):
      - من 4.5s إلى 5s: تلاشي للظهور
      - من 5s إلى 9.5s: بقاء
      - من 9.5s إلى 10s: تلاشي للاختفاء
    -->
    <animate attributeName="opacity" 
             values="0; 0; 1; 1; 0" 
             keyTimes="0; 0.45; 0.5; 0.95; 1" 
             dur="10s" 
             repeatCount="indefinite" 
             calcMode="linear" />

    <text x="600" y="550" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">Advertising space available</text>
    <text x="600" y="650" font-family="sans-serif" font-size="32" fill="#a0a0a0" text-anchor="middle">Contact Siwane management to reserve this space</text>
  </g>

  <!-- إطار خارجي خفيف -->
  <rect width="1196" height="896" x="2" y="2" fill="none" stroke="#333333" stroke-width="4" rx="16" />
</svg>
